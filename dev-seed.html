<!DOCTYPE html>
<!-- 開發用：注入測試資料後跳轉首頁（供視覺驗證，不進 sw 快取） -->
<meta charset="UTF-8">
<script>
const day = n => { const d = new Date(); d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const W = (date, part, name, sets) => ({ id: 'seed' + Math.random().toString(36).slice(2, 8), date, timestamp: Date.now(), type: 'weight', bodyPart: part, exercises: [{ name, unit: 'kg', sets }] });
const data = {
  avatar: { name: '阿力', gender: 'm', height: 175, weight: 72, createdAt: Date.now() - 90 * 86400000 },
  workouts: [
    W(day(1), 'chest', '槓鈴臥推', [{ weight: 80, reps: 8 }, { weight: 85, reps: 5 }]),
    W(day(3), 'shoulders', '啞鈴肩推', [{ weight: 24, reps: 10 }]),
    W(day(2), 'back', '引體向上', [{ weight: '', reps: 8 }]),
    W(day(12), 'legs', '深蹲', [{ weight: 70, reps: 6 }]),
    W(day(6), 'biceps', '啞鈴彎舉', [{ weight: 14, reps: 12 }]),
    W(day(4), 'core', '捲腹', [{ weight: '', reps: 20 }]),
    { id: 'seedrun1', date: day(2), timestamp: Date.now(), type: 'outdoor_run', distance: 5, duration: 30 },
    { id: 'seedrun2', date: day(9), timestamp: Date.now(), type: 'outdoor_run', distance: 8, duration: 50 },
  ],
  custom: {}, prs: {},
  bodyWeights: [{ date: day(30), weight: 73 }, { date: day(2), weight: 72 }],
  restPeriods: [],
};
localStorage.setItem('fitnessApp_v1', JSON.stringify(data));
localStorage.setItem('lastExportDate', day(1));
location.replace('index.html');
</script>
